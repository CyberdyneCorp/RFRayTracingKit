name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: C++ core (default)
            flags: "-DRFTRACE_BUILD_EXAMPLES=OFF"
          - name: C API (librftrace_c)
            flags: "-DRFTRACE_ENABLE_C_API=ON -DRFTRACE_BUILD_EXAMPLES=OFF"
    env:
      # vcpkg binary cache — persisted between runs so assimp et al. build once.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang cmake

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Bootstrap vcpkg
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          git clone --depth 1 https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake"
          ${{ matrix.flags }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -j

  # The GPU backends (CUDA/Metal/OpenCL) and the Swift bindings are intentionally
  # NOT built here: CI runners have no NVIDIA/Apple GPU or Swift toolchain. They
  # are validated on the appropriate hardware/toolchain (see the backend + Swift
  # READMEs). This job guards the default C++/C build that every change must keep
  # green.

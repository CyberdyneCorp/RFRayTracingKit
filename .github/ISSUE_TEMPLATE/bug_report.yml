name: Bug report
description: Report incorrect behavior, a crash, or a numerical discrepancy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, do not file here — see
        [SECURITY.md](https://github.com/CyberdyneCorp/RFRayTracingKit/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: Received power differs from the CPU reference by N dB for a reflected path...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal case — scene/mesh, transmitter/receiver setup, simulation mode, backend, and how you drove it (C++, Python, Swift, CLI, or `just`).
      placeholder: |
        just example simple_los
        # or a code snippet / Python script / CLI command + scene JSON
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: Backend
      placeholder: CPU (BVH) / Embree / CUDA / OpenCL / Metal
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler + version, CMake version, GPU + driver (if relevant), commit/tag.
      placeholder: |
        Ubuntu 24.04, clang 18, CMake 3.28, RTX 5060 (driver 580.95), commit abc1234
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant build or run output (paste as text or attach files).
      render: shell
